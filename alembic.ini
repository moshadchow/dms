# alembic.ini — place in backend/ root (same folder as main.py)

[alembic]
# Path to the migration environment — relative to this file
script_location = migrations

# Migration file naming pattern
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Add current directory to sys.path
prepend_sys_path = .

# Truncate the slug (message) to this many chars
truncate_slug_length = 40

# OS-dependent path separator for version_locations
version_path_separator = os

# Database URL — overridden at runtime by env.py from .env
# Update this to match your local setup if running alembic outside Docker
sqlalchemy.url = postgresql+psycopg2://postgres:root@localhost:5432/dms_db


[post_write_hooks]
# Leave empty — add black/ruff formatting hooks here if desired


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S